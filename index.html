<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Wedge Stats">
<title>⛳ Wedge Stats</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232d7a3a'/><text y='78' x='50' text-anchor='middle' font-size='65'>⛳</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232d7a3a'/><text y='78' x='50' text-anchor='middle' font-size='65'>⛳</text></svg>">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeede9;
    --text: #1a1a18;
    --text2: #6b6b67;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 10px;
    --radius-lg: 14px;
    --green: #0F6E56;
    --green-bg: #E1F5EE;
    --red: #A32D2D;
    --red-bg: #FCEBEB;
    --amber: #854F0B;
    --amber-bg: #FAEEDA;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #2a2a28;
      --bg3: #333330;
      --text: #f0efe8;
      --text2: #9a9a94;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
      --green: #5DCAA5;
      --green-bg: #085041;
      --red: #F09595;
      --red-bg: #4A1B0C;
      --amber: #FAC775;
      --amber-bg: #412402;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); font-size: 15px; line-height: 1.5; }
  .app { max-width: 700px; margin: 0 auto; padding: 0 0 80px; }

  /* Header */
  .header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 14px 16px 10px; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header p { font-size: 12px; color: var(--text2); margin-top: 1px; }

  /* Bottom tabs */
  .bottom-tabs { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 0.5px solid var(--border); display: flex; z-index: 100; }
  .btab { flex: 1; padding: 10px 4px 12px; text-align: center; cursor: pointer; font-size: 10px; color: var(--text2); border: none; background: transparent; }
  .btab svg { display: block; margin: 0 auto 3px; width: 22px; height: 22px; }
  .btab.active { color: var(--green); }
  .btab.active svg { stroke: var(--green); }
  .btab svg { stroke: var(--text2); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* Sections */
  .section { display: none; padding: 14px 12px; }
  .section.active { display: block; }

  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 12px; }
  .section-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }

  .form-group { margin-bottom: 10px; }
  label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
  select, input[type=number], input[type=text] {
    width: 100%; padding: 9px 12px; border: 0.5px solid var(--border2);
    border-radius: var(--radius); font-size: 15px; background: var(--bg);
    color: var(--text); appearance: none; -webkit-appearance: none;
  }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  .btn { padding: 10px 20px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 15px; cursor: pointer; background: transparent; color: var(--text); width: 100%; margin-top: 4px; }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }
  .btn-sm { padding: 4px 10px; font-size: 12px; width: auto; }
  .btn-danger { color: var(--red); border-color: var(--red); }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-card { background: var(--bg2); border-radius: var(--radius); padding: 12px; }
  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  .stat-val { font-size: 22px; font-weight: 600; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { font-weight: 500; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; padding: 6px 8px; border-bottom: 0.5px solid var(--border); text-align: left; }
  td { padding: 8px 8px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
  .b-face { background: var(--red-bg); color: var(--red); }
  .b-arr { background: var(--green-bg); color: var(--green); }
  .b-trav { background: var(--amber-bg); color: var(--amber); }
  .b-calm { background: var(--bg2); color: var(--text2); }
  .amp-badge { background: var(--bg2); color: var(--text2); font-size: 11px; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }

  .empty { text-align: center; color: var(--text2); font-size: 14px; padding: 2rem 1rem; }
  .save-msg { font-size: 13px; color: var(--green); margin-top: 8px; text-align: center; min-height: 20px; }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-bar > div { flex: 1; min-width: 100px; }

  .avg-wrap { overflow-x: auto; }
  .print-bar { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 12px; }
  .print-bar > div:first-child { flex: 1; }
  .print-bar > div:last-child { flex-shrink: 0; }

  .del-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .del-row:last-child { border-bottom: none; }

  @media print {
    .header, .bottom-tabs, .print-bar, .btn, .filter-bar { display: none !important; }
    .section { display: block !important; padding: 0; }
    #tab-saisie, #tab-stats, #tab-clubs { display: none !important; }
    #tab-tableau { display: block !important; }
    body { background: white; }
    .card { border: 1px solid #ccc; margin-bottom: 16px; }
    .stat-card { border: 1px solid #ccc; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>⛳ Wedge Stats</h1>
  <p>Suivi de tes coups de wedge</p>
</div>

<div class="app">

  <!-- SAISIE -->
  <div class="section active" id="tab-saisie">
    <div class="card">
      <div class="section-title">Nouveau coup</div>
      <div class="form-row-2">
        <div class="form-group">
          <label>Club</label>
          <select id="inp-club"></select>
        </div>
        <div class="form-group">
          <label>Amplitude</label>
          <select id="inp-amp">
            <option>7h–9h</option>
            <option>9h–10h30</option>
            <option>10h30–12h (plein)</option>
            <option>3h–5h</option>
            <option>5h–7h</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Distance (mètres)</label>
        <input type="number" id="inp-dist" min="0" max="250" placeholder="Ex: 85">
      </div>
      <div class="form-row-2">
        <div class="form-group">
          <label>Direction du vent</label>
          <select id="inp-wind-dir">
            <option value="calme">Calme</option>
            <option value="face">Face</option>
            <option value="arrière">Arrière</option>
            <option value="travers">Travers</option>
            <option value="face-travers">Face-travers</option>
            <option value="arrière-travers">Arr.-travers</option>
          </select>
        </div>
        <div class="form-group">
          <label>Force du vent</label>
          <select id="inp-wind-str">
            <option value="0">Calme</option>
            <option value="1">1 — Légère brise</option>
            <option value="2">2 — Modéré</option>
            <option value="3">3 — Fort</option>
            <option value="4">4 — Très fort</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Note (optionnel)</label>
        <input type="text" id="inp-note" placeholder="Ex: propre, thin, fat...">
      </div>
      <button class="btn btn-primary" onclick="addShot()">Enregistrer le coup</button>
      <div class="save-msg" id="save-msg"></div>
    </div>

    <div class="card">
      <div class="section-title">Derniers coups</div>
      <div id="recent-shots"><div class="empty">Aucun coup enregistré</div></div>
    </div>
  </div>

  <!-- STATS -->
  <div class="section" id="tab-stats">
    <div class="filter-bar">
      <div>
        <label>Club</label>
        <select id="flt-club" onchange="renderStats()">
          <option value="">Tous</option>
        </select>
      </div>
      <div>
        <label>Amplitude</label>
        <select id="flt-amp" onchange="renderStats()">
          <option value="">Toutes</option>
          <option>7h–9h</option>
          <option>9h–10h30</option>
          <option>10h30–12h (plein)</option>
          <option>3h–5h</option>
          <option>5h–7h</option>
        </select>
      </div>
      <div>
        <label>Vent</label>
        <select id="flt-wind" onchange="renderStats()">
          <option value="">Tous</option>
          <option value="calme">Calme</option>
          <option value="face">Face</option>
          <option value="arrière">Arrière</option>
          <option value="travers">Travers</option>
          <option value="face-travers">Face-travers</option>
          <option value="arrière-travers">Arr.-travers</option>
        </select>
      </div>
    </div>
    <div class="stats-grid" id="stats-cards"></div>
    <div class="card">
      <div class="section-title">Coups filtrés</div>
      <div id="shots-table"><div class="empty">Aucune donnée</div></div>
    </div>
  </div>

  <!-- TABLEAU MOYENNES -->
  <div class="section" id="tab-tableau">
    <div class="print-bar">
      <div>
        <label>Club</label>
        <select id="tbl-club" onchange="renderAvgTable()">
          <option value="">Tous les clubs</option>
        </select>
      </div>
      <div>
        <button class="btn btn-sm" onclick="window.print()" style="white-space:nowrap;">🖨️ Imprimer</button>
      </div>
    </div>
    <div id="avg-table"></div>
  </div>

  <!-- CLUBS -->
  <div class="section" id="tab-clubs">
    <div class="card">
      <div class="section-title">Mes clubs</div>
      <div class="form-row-2" style="margin-bottom:10px;">
        <input type="text" id="new-club" placeholder="Ex: SW 58°">
        <button class="btn btn-primary" onclick="addClub()">Ajouter</button>
      </div>
      <div id="clubs-list"></div>
    </div>
    <div class="card">
      <div class="section-title">Données</div>
      <button class="btn" onclick="exportData()" style="margin-bottom:8px;">📤 Exporter mes données (JSON)</button>
      <div style="font-size:12px;color:var(--text2);margin-top:6px;" id="shot-count"></div>
    </div>
  </div>

</div>

<!-- Bottom navigation -->
<nav class="bottom-tabs">
  <button class="btab active" onclick="showTab('saisie', this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
    Saisie
  </button>
  <button class="btab" onclick="showTab('stats', this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9"/><rect x="10" y="7" width="4" height="14"/><rect x="17" y="3" width="4" height="18"/></svg>
    Stats
  </button>
  <button class="btab" onclick="showTab('tableau', this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
    Tableau
  </button>
  <button class="btab" onclick="showTab('clubs', this)">
    <svg viewBox="0 0 24 24"><path d="M12 2C8 2 5 5 5 8c0 4 7 14 7 14s7-10 7-14c0-3-2.7-6-7-6z"/><circle cx="12" cy="8" r="2"/></svg>
    Clubs
  </button>
</nav>

<script>
let data = JSON.parse(localStorage.getItem('wedge_data') || '{"clubs":["PW","GW 50°","SW 56°","LW 60°"],"shots":[]}');

function save() { localStorage.setItem('wedge_data', JSON.stringify(data)); updateShotCount(); }

function showTab(t, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'tab-' + t));
  document.querySelectorAll('.btab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (t === 'stats') renderStats();
  if (t === 'tableau') renderAvgTable();
  if (t === 'clubs') { renderClubs(); updateShotCount(); }
}

function windBadge(dir, str) {
  if (!dir || dir === 'calme') return '<span class="badge b-calm">Calme</span>';
  const cls = dir.startsWith('face') ? 'b-face' : dir.startsWith('arr') ? 'b-arr' : 'b-trav';
  const force = ['','1','2','3','4'][+str] || '';
  return `<span class="badge ${cls}">${dir}${force ? ' ' + force : ''}</span>`;
}

function refreshClubSelects() {
  ['inp-club','flt-club','tbl-club'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const cur = el.value;
    const prefix = id === 'inp-club' ? '' : '<option value="">Tous</option>';
    el.innerHTML = prefix + data.clubs.map(c => `<option value="${c}">${c}</option>`).join('');
    if (cur && [...el.options].some(o => o.value === cur)) el.value = cur;
  });
}

function addClub() {
  const v = document.getElementById('new-club').value.trim();
  if (!v || data.clubs.includes(v)) return;
  data.clubs.push(v);
  save();
  document.getElementById('new-club').value = '';
  renderClubs();
  refreshClubSelects();
}

function removeClub(i) {
  if (!confirm('Supprimer ce club ?')) return;
  data.clubs.splice(i, 1);
  save();
  renderClubs();
  refreshClubSelects();
}

function renderClubs() {
  const el = document.getElementById('clubs-list');
  if (!data.clubs.length) { el.innerHTML = '<div class="empty">Aucun club</div>'; return; }
  el.innerHTML = data.clubs.map((c,i) => `<div class="del-row">
    <span style="font-size:15px;">${c}</span>
    <button class="btn btn-sm btn-danger" onclick="removeClub(${i})">Supprimer</button>
  </div>`).join('');
}

function updateShotCount() {
  const el = document.getElementById('shot-count');
  if (el) el.textContent = `${data.shots.length} coup(s) enregistré(s)`;
}

function addShot() {
  const club = document.getElementById('inp-club').value;
  const amp = document.getElementById('inp-amp').value;
  const dist = parseFloat(document.getElementById('inp-dist').value);
  const windDir = document.getElementById('inp-wind-dir').value;
  const windStr = document.getElementById('inp-wind-str').value;
  const note = document.getElementById('inp-note').value.trim();
  if (!club || isNaN(dist) || dist <= 0) {
    document.getElementById('save-msg').textContent = '⚠️ Renseigne le club et la distance.';
    document.getElementById('save-msg').style.color = 'var(--red)';
    return;
  }
  data.shots.unshift({ club, amp, dist, windDir, windStr, note, date: new Date().toLocaleDateString('fr-FR') });
  save();
  document.getElementById('inp-dist').value = '';
  document.getElementById('inp-note').value = '';
  const msg = document.getElementById('save-msg');
  msg.style.color = 'var(--green)';
  msg.textContent = '✓ Coup enregistré !';
  setTimeout(() => msg.textContent = '', 2500);
  renderRecent();
}

function renderRecent() {
  const el = document.getElementById('recent-shots');
  if (!data.shots.length) { el.innerHTML = '<div class="empty">Aucun coup enregistré</div>'; return; }
  const rows = data.shots.slice(0, 30).map((s, i) => `<tr>
    <td style="white-space:nowrap;font-size:12px;color:var(--text2);">${s.date}</td>
    <td><strong>${s.club}</strong></td>
    <td><span class="amp-badge">${s.amp}</span></td>
    <td style="font-weight:600;">${s.dist} m</td>
    <td>${windBadge(s.windDir, s.windStr)}</td>
    <td><button class="btn btn-sm btn-danger" onclick="removeShot(${i})" style="padding:2px 8px;font-size:11px;">×</button></td>
  </tr>`).join('');
  el.innerHTML = `<div style="overflow-x:auto;"><table>
    <thead><tr><th>Date</th><th>Club</th><th>Amplitude</th><th>Dist.</th><th>Vent</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function removeShot(i) {
  if (!confirm('Supprimer ce coup ?')) return;
  data.shots.splice(i, 1);
  save();
  renderRecent();
}

function filterShots() {
  const club = document.getElementById('flt-club')?.value || '';
  const amp = document.getElementById('flt-amp')?.value || '';
  const wind = document.getElementById('flt-wind')?.value || '';
  return data.shots.filter(s =>
    (!club || s.club === club) &&
    (!amp || s.amp === amp) &&
    (!wind || s.windDir === wind)
  );
}

function renderStats() {
  const shots = filterShots();
  const cards = document.getElementById('stats-cards');
  if (!shots.length) {
    cards.innerHTML = '';
    document.getElementById('shots-table').innerHTML = '<div class="empty">Aucune donnée pour ces filtres</div>';
    return;
  }
  const dists = shots.map(s => s.dist);
  const avg = Math.round(dists.reduce((a,b) => a+b, 0) / dists.length);
  cards.innerHTML = `
    <div class="stat-card"><div class="stat-label">Coups</div><div class="stat-val">${shots.length}</div></div>
    <div class="stat-card"><div class="stat-label">Moyenne</div><div class="stat-val">${avg} m</div></div>
    <div class="stat-card"><div class="stat-label">Mini</div><div class="stat-val">${Math.min(...dists)} m</div></div>
    <div class="stat-card"><div class="stat-label">Maxi</div><div class="stat-val">${Math.max(...dists)} m</div></div>
  `;
  const rows = shots.map(s => `<tr>
    <td style="font-size:12px;color:var(--text2);">${s.date}</td>
    <td><strong>${s.club}</strong></td>
    <td><span class="amp-badge">${s.amp}</span></td>
    <td style="font-weight:600;">${s.dist} m</td>
    <td>${windBadge(s.windDir, s.windStr)}</td>
    <td style="color:var(--text2);font-size:12px;">${s.note || ''}</td>
  </tr>`).join('');
  document.getElementById('shots-table').innerHTML = `<div style="overflow-x:auto;"><table>
    <thead><tr><th>Date</th><th>Club</th><th>Amplitude</th><th>Dist.</th><th>Vent</th><th>Note</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function avg(arr) { return arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : null; }

function renderAvgTable() {
  const clubFilter = document.getElementById('tbl-club')?.value || '';
  const amps = ['7h–9h','9h–10h30','10h30–12h (plein)','3h–5h','5h–7h'];
  const winds = [
    { key: 'calme', label: 'Calme' },
    { key: 'face', label: 'Face' },
    { key: 'face-travers', label: 'Face-trav.' },
    { key: 'travers', label: 'Travers' },
    { key: 'arrière-travers', label: 'Arr.-trav.' },
    { key: 'arrière', label: 'Arrière' },
  ];
  const clubs = clubFilter ? [clubFilter] : data.clubs;
  let html = '';
  clubs.forEach(club => {
    const cs = data.shots.filter(s => s.club === club);
    html += `<div class="card">
      <div class="section-title">${club}</div>
      <div style="overflow-x:auto;">
      <table>
        <thead><tr>
          <th>Amplitude</th>
          ${winds.map(w => `<th style="white-space:nowrap;">${w.label}</th>`).join('')}
          <th>Global</th>
        </tr></thead>
        <tbody>`;
    amps.forEach(amp => {
      const rs = cs.filter(s => s.amp === amp);
      const g = avg(rs.map(s => s.dist));
      html += `<tr><td><span class="amp-badge">${amp}</span></td>`;
      winds.forEach(w => {
        const v = avg(rs.filter(s => s.windDir === w.key).map(s => s.dist));
        html += `<td style="text-align:center;">${v !== null ? `<strong>${v}</strong>` : '<span style="color:var(--text2)">—</span>'}</td>`;
      });
      html += `<td style="text-align:center;font-weight:600;">${g !== null ? g + ' m' : '—'}</td></tr>`;
    });
    html += `</tbody></table></div></div>`;
  });
  if (!html) html = '<div class="empty">Aucun club configuré</div>';
  document.getElementById('avg-table').innerHTML = html;
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wedge_stats_backup.json';
  a.click();
}

refreshClubSelects();
renderRecent();
updateShotCount();
</script>
</body>
</html>
